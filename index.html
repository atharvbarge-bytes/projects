<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mental Health Support Chatbot</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f7f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .chat-container {
        width: 360px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        display: flex;
        flex-direction: column;
    }
    .chat-header {
        background: #2e8b8b;
        color: white;
        padding: 15px;
        text-align: center;
        font-weight: bold;
        border-radius: 12px 12px 0 0;
    }
    .chat-box {
        flex: 1;
        padding: 15px;
        overflow-y: auto;
    }
    .message {
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 8px;
        max-width: 80%;
    }
    .bot {
        background: #e6f2f2;
        align-self: flex-start;
    }
    .user {
        background: #cce5ff;
        align-self: flex-end;
    }
    .input-area {
        display: flex;
        border-top: 1px solid #ccc;
    }
    input {
        flex: 1;
        padding: 12px;
        border: none;
        outline: none;
    }
    button {
        padding: 12px 15px;
        border: none;
        background: #2e8b8b;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Mental Health Support Bot</div>
    <div class="chat-box" id="chatBox">
        <div class="message bot">
            Hi, I’m here to support you 💙  
            You can talk to me about how you’re feeling.
        </div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="Type your message..." />
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if (text === "") return;

    addMessage(text, "user");
    input.value = "";

    setTimeout(() => botReply(text.toLowerCase()), 600);
}

function addMessage(text, sender) {
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.className = "message " + sender;
    msg.textContent = text;
    chatBox.appendChild(msg);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function botReply(text) {
    let reply = "";

    // 🚨 Crisis detection
    if (text.includes("suicide") || text.includes("kill myself") || text.includes("self harm")) {
        reply = "I’m really sorry you’re feeling this way. You’re not alone. Please consider reaching out to someone right now. In India, you can call **AASRA: 91-9820466726**. If you’re in immediate danger, contact local emergency services.";
    }
    else if (text.includes("sad") || text.includes("depressed") || text.includes("low")) {
        reply = "I’m sorry you’re feeling low. It’s okay to feel this way. Would you like to talk about what’s been troubling you?";
    }
    else if (text.includes("stress") || text.includes("anxious") || text.includes("anxiety")) {
        reply = "Stress can feel overwhelming. Try this: take a slow breath in for 4 seconds, hold for 4, and breathe out for 6. Want to try together?";
    }
    else if (text.includes("tired") || text.includes("burnout")) {
        reply = "Feeling tired can be really hard. Have you been resting enough, or has something been draining your energy lately?";
    }
    else if (text.includes("happy") || text.includes("good")) {
        reply = "I’m glad to hear that 😊 What’s been going well for you?";
    }
    else {
        reply = "Thank you for sharing. I’m listening. Tell me more about how you’re feeling.";
    }

    addMessage(reply, "bot");
}
</script>

</body>
</html>
